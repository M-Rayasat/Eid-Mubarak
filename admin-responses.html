<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Responses</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .stats {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stats h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .response-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .response-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .response-time {
            color: #666;
            font-size: 0.9rem;
        }

        .question-answer {
            margin-bottom: 15px;
        }

        .question {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .answer {
            color: #555;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }

        .no-responses {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 50px;
        }

        .clear-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .clear-btn:hover {
            background: #c0392b;
        }

        .export-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-left: 10px;
        }

        .export-btn:hover {
            background: #229954;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 User Responses Dashboard</h1>

        <div class="stats">
            <h2>Total Responses: <span id="totalCount">0</span></h2>
            <button class="export-btn" onclick="exportResponses()">📥 Export as Text</button>
            <button class="clear-btn" onclick="clearAllResponses()">🗑️ Clear All Data</button>
        </div>

        <div id="responsesContainer"></div>
    </div>

    <script>
        function loadResponses() {
            const responses = JSON.parse(localStorage.getItem('eidResponses') || '[]');
            const container = document.getElementById('responsesContainer');
            const totalCount = document.getElementById('totalCount');

            totalCount.textContent = responses.length;

            if (responses.length === 0) {
                container.innerHTML = '<div class="no-responses">No responses yet</div>';
                return;
            }

            container.innerHTML = '';

            responses.reverse().forEach((entry, index) => {
                const card = document.createElement('div');
                card.className = 'response-card';

                const date = new Date(entry.timestamp);
                const formattedDate = date.toLocaleString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                card.innerHTML = `
                    <div class="response-header">
                        <div class="response-number">Response #${responses.length - index}</div>
                        <div class="response-time">${formattedDate}</div>
                    </div>
                    <div class="question-answer">
                        <div class="question">1. What is your beautiful name?</div>
                        <div class="answer">${entry.answers.dua}</div>
                    </div>
                    <div class="question-answer">
                        <div class="question">2. 😄 Be honest... Eidi kab bhej rahe ho?</div>
                        <div class="answer">${entry.answers.joy}</div>
                    </div>
                    <div class="question-answer">
                        <div class="question">3. Who is the first person you want to wish Eid Mubarak?</div>
                        <div class="answer">${entry.answers.person}</div>
                    </div>
                    <div class="question-answer">
                        <div class="question">4. What's your favorite Eid memory?</div>
                        <div class="answer">${entry.answers.memory}</div>
                    </div>
                    <div class="question-answer">
                        <div class="question">5. If you want to send a special message to Muhammad Rayasat, what would you like to say?</div>
                        <div class="answer">${entry.answers.eidi}</div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function clearAllResponses() {
            if (confirm('Are you sure you want to delete all responses? This cannot be undone!')) {
                localStorage.removeItem('eidResponses');
                loadResponses();
            }
        }

        function exportResponses() {
            const responses = JSON.parse(localStorage.getItem('eidResponses') || '[]');

            if (responses.length === 0) {
                alert('No responses to export');
                return;
            }

            let textContent = '===========================================\n';
            textContent += 'EID MUBARAK - USER RESPONSES\n';
            textContent += 'Exported: ' + new Date().toLocaleString() + '\n';
            textContent += '===========================================\n\n';

            responses.forEach((entry, index) => {
                const date = new Date(entry.timestamp);
                textContent += `-------------------------------------------\n`;
                textContent += `RESPONSE #${index + 1}\n`;
                textContent += `Date: ${date.toLocaleString()}\n`;
                textContent += `-------------------------------------------\n`;
                textContent += `1. Name: ${entry.answers.dua}\n\n`;
                textContent += `2. Eidi Status: ${entry.answers.joy}\n\n`;
                textContent += `3. First Person to Wish: ${entry.answers.person}\n\n`;
                textContent += `4. Favorite Memory: ${entry.answers.memory}\n\n`;
                textContent += `5. Message to Muhammad Rayasat: ${entry.answers.eidi}\n`;
                textContent += `-------------------------------------------\n\n`;
            });

            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `eid-responses-${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Load responses on page load
        loadResponses();

        // Auto-refresh every 5 seconds
        setInterval(loadResponses, 5000);
    </script>
</body>
</html>
